<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Girl Sync Player</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>

    <div class="container">
        <h2>Who Really Cares Cinema</h2>
        
        <div class="connection-box">
            <div id="my-id-display">Your ID: <span id="my-id">Connecting...</span></div>
            <div class="input-group">
                <input type="text" id="partner-id" placeholder="Enter Partner's ID">
                <button id="connect-btn">Connect</button>
            </div>
            <p id="status">Status: Disconnected</p>
        </div>

        <div class="video-input-box">
            <div class="input-group">
                <input type="text" id="video-url" placeholder="Paste direct MP4 link here...">
                <button id="load-video-btn">Load</button>
            </div>
        </div>

        <div class="player-wrapper">
            <video id="shared-video" controls>
                <source src="" type="video/mp4">
                Your browser does not support video playback.
            </video>
        </div>
    </div>

    <img src="https://openclipart.org/image/400px/336338" alt="Spiderman" class="sticker spiderman">
    <img src="https://img.icons8.com/color/500/hello-kitty.png" alt="Hello Kitty" class="sticker hellokitty">

    <script src="script.js"></script>
</body>
</html>
